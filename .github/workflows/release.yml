name: Release Tomino

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workdir: front/src-tauri

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Python backend sidecar
        shell: bash
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          mkdir -p front/src-tauri/binaries
          echo "XAI_API_KEY=${XAI_API_KEY}" > .env.bundle
          echo "FMP_API_KEY=${FMP_API_KEY}" >> .env.bundle
          pyinstaller --onefile --noconsole \
            --hidden-import=stripe \
            --hidden-import=resend \
            --hidden-import=cryptography \
            --hidden-import=zoneinfo \
            --hidden-import=tzdata \
            --hidden-import=xlrd \
            --collect-all=tzdata \
            --add-data ".env.bundle;." \
            --name tomino-backend app.py
          mv dist/tomino-backend.exe "front/src-tauri/binaries/tomino-backend-x86_64-pc-windows-msvc.exe"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: front

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: front
          tagName: ${{ github.ref_name }}
          releaseName: 'Tomino ${{ github.ref_name }}'
          releaseBody: |
            ## Tomino ${{ github.ref_name }}

            ### Installation
            Télécharger `TominoSetup_*_x64-setup.exe` ci-dessous.

            ### Mise à jour automatique
            Si vous avez déjà Tomino installé, la mise à jour
            sera proposée automatiquement au prochain démarrage.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
